<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zhang Family - 张氏家庭知识库</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      background: #0d1117;
      color: #c9d1d9;
      min-height: 100vh;
    }
    
    a { color: #58a6ff; text-decoration: none; }
    a:hover { text-decoration: underline; }
    
    .hero {
      background: linear-gradient(135deg, #161b22 0%, #0d1117 100%);
      border-bottom: 1px solid #21262d;
      padding: 80px 20px;
      text-align: center;
    }
    
    .hero h1 {
      font-size: 2.5rem;
      color: #f0f6fc;
      margin-bottom: 12px;
    }
    
    .hero p {
      font-size: 1.1rem;
      color: #8b949e;
      max-width: 600px;
      margin: 0 auto;
    }
    
    .hero .avatar {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: linear-gradient(135deg, #58a6ff, #a371f7);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      margin: 0 auto 20px;
    }
    
    .container {
      max-width: 960px;
      margin: 0 auto;
      padding: 40px 20px;
    }
    
    .section-title {
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: #8b949e;
      margin-bottom: 24px;
      padding-bottom: 8px;
      border-bottom: 1px solid #21262d;
    }
    
    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 20px;
    }
    
    .card {
      background: #161b22;
      border: 1px solid #21262d;
      border-radius: 8px;
      padding: 28px;
      transition: border-color 0.2s;
      cursor: pointer;
    }
    
    .card:hover {
      border-color: #58a6ff;
      text-decoration: none;
    }
    
    .card .icon {
      font-size: 2rem;
      margin-bottom: 16px;
    }
    
    .card h3 {
      color: #f0f6fc;
      font-size: 1.2rem;
      margin-bottom: 10px;
    }
    
    .card p {
      color: #8b949e;
      font-size: 0.9rem;
      line-height: 1.6;
    }
    
    .card .count {
      display: inline-block;
      background: #21262d;
      color: #8b949e;
      font-size: 0.75rem;
      padding: 2px 8px;
      border-radius: 12px;
      margin-top: 12px;
    }
    
    footer {
      text-align: center;
      padding: 40px 20px;
      color: #484f58;
      font-size: 0.85rem;
      border-top: 1px solid #21262d;
      margin-top: 40px;
    }
  </style>
</head>
<body>

<div class="hero">
  <div class="avatar">🏠</div>
  <h1>Zhang Family</h1>
  <p>家庭知识库 — 记录张腾予成长、投资研究、算法思考</p>
</div>

<div class="container">
  <div class="section-title">导航</div>
  <div class="cards">
    <a href="tengyu/" class="card">
      <div class="icon">👶</div>
      <h3>张腾予</h3>
      <p>2026年幼升小记录、成长点滴、兴趣爱好发展</p>
      <span class="count">持续更新</span>
    </a>
    
    <a href="invest/" class="card">
      <div class="icon">📈</div>
      <h3>投资研究</h3>
      <p>A股个股分析、基金操盘记录、每日复盘笔记</p>
      <span class="count">私密</span>
    </a>
    
    <a href="algo/" class="card">
      <div class="icon">🧠</div>
      <h3>算法思考</h3>
      <p>强化学习研究、RL论文笔记、工作技术探索</p>
      <span class="count">私密</span>
    </a>
  </div>
</div>

<footer>
  <p>Zhang Family · 由 Hermes Agent 自动生成 · 
  <a href="https://github.com/zhangtengyu-coding/zsdfamily">GitHub</a>
  </p>
</footer>

</body>
</html>
